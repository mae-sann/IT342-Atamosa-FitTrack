spring.application.name=fittrack

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# JWT Test Config
app.jwt.secret=your-256-bit-or-longer-secret-key-for-jwt-hmac-sha-algorithm-fittrack-2026
app.jwt.expiration-ms=86400000

# Google OAuth Test Config (placeholder)
app.google.client-id=test-client-id

# SMTP Test Config (placeholder)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@example.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=test@example.com

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
