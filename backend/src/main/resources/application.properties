spring.application.name=fittrack

# Database (fittrack_db)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fittrack_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=root
spring.datasource.password=1234567890
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:your-256-bit-or-longer-secret-key-for-jwt-hmac-sha-algorithm-fittrack-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:replace-with-google-client-id}

# SMTP Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App mail details
app.mail.from=${MAIL_FROM:no-reply@fittrack.app}

# CORS (web + future Android clients)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://localhost:3000}
